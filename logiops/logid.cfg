devices: (
  {
    name: "MX Master 4";
    dpi: 1500;

    // 1. Scroll Tuning
    smartshift: {
      on: true;
      threshold: 15;
    };

    hiresscroll: {
      on: true;
    };

    // 2. Horizontal Scroll (Sensitivity 3)
    thumbwheel: {
      divert: true;
      invert: false;
      left: {
        mode: "OnInterval";
        interval: 2;
        action: {
          type: "Keypress";
          keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_LEFT"];
        };
      };
      right: {
        mode: "OnInterval";
        interval: 2;
        action: {
          type: "Keypress";
          keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_RIGHT"];
        };
      };
    };

    buttons: (
      // 3. Thumb Rest Button (Gesture button)
      {
        cid: 0x1a0;
        action: {
            type: "Gestures";
            gestures: (
                // Hold + Move Up ──────────────── Volume Up
                {
                direction: "Up";
                mode: "OnInterval";
                interval: 150;
                action: {
                    type: "Keypress";
                    keys: [ "KEY_VOLUMEUP" ];
                };
                },

                // Hold + Move Down ────────────── Volume Down
                {
                direction: "Down";
                mode: "OnInterval";
                interval: 150;
                action: {
                    type: "Keypress";
                    keys: [ "KEY_VOLUMEDOWN" ];
                };
                },

                // Hold + Move Left ────────────── Previous Track
                {
                direction: "Left";
                mode: "OnInterval";
		interval: 350;
                action: {
                    type: "Keypress";
                    keys: [ "KEY_PREVIOUSSONG" ];
                };
                },

                // Hold + Move Right ───────────── Next Track
                {
                direction: "Right";
                mode: "OnInterval";
		interval: 350;
                action: {
                    type: "Keypress";
                    keys: [ "KEY_NEXTSONG" ];
                };
                },

                // Simple click (no movement) ──── Play/Pause
                {
                direction: "None";
                mode: "OnRelease";
                action: {
                    type: "Keypress";
                    keys: [ "KEY_PLAYPAUSE" ];
                };
                }
            );
        };
      },

      // 4. The "Mute" Button (Small button behind scroll wheels)
      {
        cid: 0x0c3;
        action: {
          type: "Keypress";
          keys: ["KEY_MUTE"];
        };
      }
    );
  },
  {
    name: "MX Keys Mini";
    buttons: (
      {
        cid: 0x10a; //fn+f8
        action: { type: "Keypress"; keys: ["KEY_PREVIOUSSONG"]; };
      },
      {
        cid: 0x11c; //fn+f9
        action: { type: "Keypress"; keys: ["KEY_NEXTSONG"]; };
      }
    );
  }
);